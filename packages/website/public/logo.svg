<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <path d="M148 195 L132 410 C130 428 144 442 162 442 L350 442 C368 442 382 428 380 410 L364 195 Z"
        fill="url(#bag)" opacity="0.95"/>

  <!-- Bag handles -->
  <path d="M200 195 L200 148 C200 112 224 88 256 88 C288 88 312 112 312 148 L312 195"
        fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" opacity="0.95"/>

  <!-- Checklist line 1 with checkmark -->
  <line x1="190" y1="265" x2="310" y2="265" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <polyline points="172,265 180,275 196,253" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checklist line 2 with checkmark -->
  <line x1="190" y1="325" x2="280" y2="325" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <polyline points="172,325 180,335 196,313" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checklist line 3 (unchecked - circle) -->
  <line x1="190" y1="385" x2="260" y2="385" stroke="#16a34a" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <circle cx="182" cy="385" r="10" fill="none" stroke="#16a34a" stroke-width="8" opacity="0.45"/>
</svg>
